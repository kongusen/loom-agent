name: Sync Wiki

on:
  push:
    branches:
      - main
      - master
    paths:
      - "wiki/**"
      - ".github/workflows/sync-wiki.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-wiki-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: main_repo
          fetch-depth: 1

      - name: Checkout wiki repo
        id: checkout_wiki
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki_repo
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Fail when wiki repo is missing
        if: steps.checkout_wiki.outcome == 'failure'
        run: |
          echo "Wiki repository is not initialized yet."
          echo "Open https://github.com/${{ github.repository }}/wiki and create the first page."
          exit 1

      - name: Configure git identity
        working-directory: wiki_repo
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Mirror wiki content
        id: sync_files
        run: |
          rsync -av --delete --exclude='.git/' main_repo/wiki/ wiki_repo/
          cd wiki_repo
          git add -A

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push wiki changes
        if: steps.sync_files.outputs.has_changes == 'true'
        working-directory: wiki_repo
        run: |
          default_branch="$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')"
          git commit -m "docs(wiki): sync from ${GITHUB_SHA}"
          git push origin HEAD:"${default_branch:-main}"

      - name: Write summary
        run: |
          {
            echo "## Wiki Sync"
            echo
            echo "- Source files: $(find main_repo/wiki -type f | wc -l | tr -d ' ')"
            echo "- Synced changes: ${{ steps.sync_files.outputs.has_changes }}"
          } >> "$GITHUB_STEP_SUMMARY"
